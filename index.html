<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Marvel Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">PWA</p>
      <h1>Marvel Tracker</h1>
      <p class="subtitle">Filme, Serien & Specials in deiner MCU-Reihenfolge</p>
    </div>
    <button id="installBtn" class="ghost hidden">Installieren</button>
  </header>

  <main>
    <section class="dashboard" aria-label="Dashboard">
      <article class="card"><span id="doneItems">0</span><small>gesehen</small></article>
      <article class="card"><span id="leftItems">0</span><small>offen</small></article>
      <article class="card"><span id="leftMovies">0</span><small>Filme offen</small></article>
      <article class="card"><span id="leftSeries">0</span><small>Serien/Staffeln offen</small></article>
      <article class="card"><span id="leftSpecials">0</span><small>Specials offen</small></article>
      <article class="card wide"><span id="leftMinutes">0 Min</span><small>Restzeit</small></article>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="Suchen…" autocomplete="off" />
      <select id="phaseFilter">
        <option value="all">Alle Phasen</option>
      </select>
      <select id="typeFilter">
        <option value="all">Alles</option>
        <option value="Film">Filme</option>
        <option value="Serie">Serien</option>
        <option value="Special">Specials</option>
      </select>
      <select id="statusFilter">
        <option value="all">Alle</option>
        <option value="open">Offen</option>
        <option value="done">Gesehen</option>
      </select>
    </section>

    <section class="actions">
      <button id="resetBtn" class="danger">Fortschritt zurücksetzen</button>
      <button id="exportBtn">Backup exportieren</button>
      <label class="file-label">Backup importieren<input id="importInput" type="file" accept="application/json" /></label>
    </section>

    <section id="list" class="list" aria-label="Marvel Liste"></section>
  </main>

  <template id="itemTemplate">
    <article class="item">
      <div class="item-top">
        <div>
          <div class="badges"></div>
          <h2></h2>
          <p class="meta"></p>
        </div>
        <label class="check"><input type="checkbox" /> gesehen</label>
      </div>
      <div class="progress-wrap hidden">
        <div class="progress-line"><span></span></div>
        <div class="episode-row">
          <button class="minus">−1</button>
          <strong class="episodes"></strong>
          <button class="plus">+1 Folge</button>
        </div>
      </div>
      <details>
        <summary>Bearbeiten</summary>
        <div class="edit-grid">
          <label>Laufzeit pro Film/Special (Min)<input class="edit-runtime" type="number" min="0" /></label>
          <label>Folgen gesamt<input class="edit-total" type="number" min="0" /></label>
          <label>Minuten pro Folge<input class="edit-epmin" type="number" min="0" /></label>
          <label>IMDb-Link<input class="edit-imdb" type="url" /></label>
        </div>
      </details>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
