<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Marvel Tracker</title>
  <meta name="theme-color" content="#7b1f24">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">PWA · MCU Watch Order</p>
      <h1>Marvel Tracker</h1>
      <p class="version">Version 13</p>
      <details class="backup-menu backup-under-version">
        <summary>Backup</summary>
        <div class="backup-panel">
          <button id="exportBtn" type="button">Backup exportieren</button>
          <label class="file-label">Backup importieren<input id="importInput" type="file" accept="application/json"></label>
          <button id="resetSeedBtn" type="button" class="danger ghost">Seed-Daten neu laden</button>
        </div>
      </details>
    </div>
    <div class="header-actions">
      <div id="headerProgress" class="header-progress">0,00%</div>
      <button id="installBtn" class="ghost hidden">Installieren</button>
    </div>
  </header>

  <main>
    <section class="dashboard" id="dashboard"></section>

    <section class="toolbar card">
      <input id="searchInput" type="search" placeholder="Suchen: Iron Man, Phase 4, Daredevil...">
      <select id="typeFilter">
        <option value="all">Alle Typen</option>
        <option value="movie">Filme</option>
        <option value="series">Serien</option>
        <option value="special">Specials</option>
      </select>
      <select id="statusFilter">
        <option value="all">Alle Status</option>
        <option value="open">Offen</option>
        <option value="started">Angefangen</option>
        <option value="done">Fertig</option>
      </select>
      <select id="phaseFilter"><option value="all">Alle Phasen</option></select>
      <button id="resetFilters" class="ghost">Filter zurücksetzen</button>
    </section>

    <section id="list" class="list"></section>
  </main>

  <dialog id="editDialog">
    <form method="dialog" id="editForm" class="modal-card">
      <h2 id="editTitle">Eintrag bearbeiten</h2>
      <div class="grid two">
        <label>Titel<input name="title" required></label>
        <label>Jahr/Start<input name="year"></label>
        <label>Phase<input name="phase"></label>
        <label>Typ<select name="type"><option value="movie">Film</option><option value="series">Serie</option><option value="special">Special</option></select></label>
        <label>Laufzeit Minuten <input name="runtimeMin" type="number" min="0" step="1"></label>
        <label>Folgen gesamt <input name="episodesTotal" type="number" min="0" step="1"></label>
        <label>Folgen gesehen <input name="episodesWatched" type="number" min="0" step="1"></label>
        <label>IMDb-Link <input name="imdbUrl" type="url"></label>
      </div>
      <label>Notiz<textarea name="note" rows="3"></textarea></label>
      <menu>
        <button value="cancel" class="ghost">Abbrechen</button>
        <button id="saveEdit" value="default">Speichern</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
